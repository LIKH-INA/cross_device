name: cross_device
description: A Flutter project for cross-device clipboard with image/text sync
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.15.2
  cloud_firestore: ^5.6.0

  # Image pick & file pick
  image_picker: ^1.1.1
  file_picker: ^8.0.0



  # Path & share
  path_provider: ^2.0.15
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
